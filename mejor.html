<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BioQuest — Aprendé Biología</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EC;
    --paper-line:#E2DCC9;
    --ink:#1E2A1F;
    --ink-soft:#5B6459;
    --leaf:#2E7D4F;
    --leaf-dark:#1D5C37;
    --leaf-pale:#DCEEDF;
    --violet:#6C4FA1;
    --violet-dark:#4E3577;
    --violet-pale:#E7E0F3;
    --coral:#E1552C;
    --coral-dark:#B33F1E;
    --coral-pale:#FBE0D4;
    --amber:#C68A1F;
    --amber-dark:#8F6212;
    --amber-pale:#F5E7C7;
    --teal:#1E7A6B;
    --teal-dark:#125349;
    --teal-pale:#D7ECE8;
    --plum:#8C4A6B;
    --plum-dark:#63304A;
    --plum-pale:#F0DFE8;
    --sky:#2E6DA4;
    --sky-dark:#1F4E78;
    --sky-pale:#DCE9F5;
    --white:#FFFFFF;
    --shadow: 0 4px 0 rgba(30,42,31,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:24px;}

  h1,h2,h3{font-family:'Fraunces', serif; margin:0; letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono', monospace;}

  button{font-family:inherit; cursor:pointer; border:none;}
  button:focus-visible, [tabindex]:focus-visible{outline:3px solid var(--amber); outline-offset:2px;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 10px;
    position:sticky; top:0; z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--paper-line);
  }
  .stat{display:flex; align-items:center; gap:6px; font-weight:700; font-size:15px;}
  .stat svg{width:20px; height:20px; flex:none;}

  /* ---------- Home / path screen ---------- */
  .home-header{padding:22px 20px 6px;}
  .home-header .eyebrow{
    font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-soft); font-weight:600;
  }
  .home-header h1{font-size:26px; margin-top:4px; color:var(--leaf-dark);}
  .home-header p.lead{font-size:13.5px; color:var(--ink-soft); margin-top:6px; max-width:38ch; line-height:1.4;}

  /* ---------- Practice / Repaso card ---------- */
  .practice-card{
    margin:18px 20px 4px; padding:16px 18px; border-radius:14px;
    background:linear-gradient(135deg,#4A3D63,#241D33); color:var(--white);
    box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .practice-card .txt h3{font-size:15px; margin-bottom:3px;}
  .practice-card .txt p{font-size:11.5px; opacity:0.82; margin:0; line-height:1.4;}
  .practice-card button{
    background:var(--white); color:var(--violet-dark); font-weight:700; font-size:12.5px;
    padding:10px 16px; border-radius:9px; flex:none; box-shadow:0 3px 0 rgba(0,0,0,0.2);
  }
  .practice-card button:active{transform:translateY(2px); box-shadow:none;}
  .practice-card .icon-wrap{width:34px; height:34px; flex:none; opacity:0.9;}
  .practice-card .icon-wrap svg{width:100%; height:100%; stroke:var(--white); fill:none; stroke-width:1.6;}
  .practice-locked{
    margin:18px 20px 4px; padding:14px 18px; border-radius:14px;
    border:2px dashed var(--paper-line); color:var(--ink-soft); font-size:12.5px; text-align:center; line-height:1.4;
  }

  .unit-block{margin:26px 0 6px;}
  .unit-header{
    margin:0 20px 22px;
    padding:14px 18px;
    border-radius:14px;
    color:var(--white);
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:var(--shadow);
  }
  .unit-header h2{font-size:18px;}
  .unit-header .unit-sub{font-size:12px; opacity:0.85; margin-top:2px; font-weight:500;}

  .path{position:relative; padding:6px 0 10px;}

  .node-row{display:flex; justify-content:center; margin:2px 0;}
  .node-row.offset-left{justify-content:flex-start; padding-left:18%;}
  .node-row.offset-right{justify-content:flex-end; padding-right:18%;}

  .node{
    width:74px; height:74px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    margin:10px 0;
  }
  .node button.hex{
    width:100%; height:100%;
    clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    transition: transform .12s ease;
  }
  .node button.hex:active{transform:translateY(3px);}
  .node.locked button.hex{background:#D8D3C4; box-shadow:0 4px 0 #BEB8A4; color:#8B8570;}
  .node.locked button.hex svg{stroke:#8B8570;}
  .node.current button.hex{animation:pulse 1.8s ease-in-out infinite;}
  .node-label{
    position:absolute; top:80px; left:50%; transform:translateX(-50%);
    font-size:11px; font-weight:600; color:var(--ink-soft); width:110px; text-align:center; line-height:1.25;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 4px 0 rgba(30,42,31,0.18), 0 0 0 0 rgba(46,125,79,0.35); }
    50%{ box-shadow:0 4px 0 rgba(30,42,31,0.18), 0 0 0 10px rgba(46,125,79,0); }
  }
  .node svg.icon{width:30px; height:30px; fill:none; stroke:var(--white); stroke-width:1.8;}
  .node .check{position:absolute; bottom:-4px; right:-2px; width:22px; height:22px; background:var(--amber); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 0 rgba(0,0,0,0.15);}
  .node .check svg{width:13px; height:13px; stroke:var(--white); stroke-width:3; fill:none;}

  /* ---------- Shared lesson/teach header ---------- */
  .lesson-header{
    display:flex; align-items:center; gap:10px; padding:14px 18px;
    position:sticky; top:0; background:var(--paper); z-index:20; border-bottom:1px solid var(--paper-line);
  }
  .exit-btn{background:none; color:var(--ink-soft); font-size:22px; line-height:1; padding:4px;}
  .progress-track{flex:1; height:12px; background:#E2DCC9; border-radius:8px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--leaf); border-radius:8px; transition:width .35s ease;}
  .progress-fill.practice-fill{background:var(--violet);}
  .hearts-mini{display:flex; align-items:center; gap:4px; font-weight:700; color:var(--coral-dark); font-size:14px; flex:none;}
  .hearts-mini svg{width:18px; height:18px;}
  .teach-heading-line{flex:1; font-weight:700; font-size:13.5px; color:var(--ink-soft);}
  .combo-badge{
    display:flex; align-items:center; gap:3px; background:var(--amber-pale); color:var(--amber-dark);
    font-weight:700; font-size:12px; padding:4px 8px; border-radius:20px; flex:none; white-space:nowrap;
  }

  /* ---------- Teach screen ---------- */
  .teach-wrap{padding:22px 20px 130px;}
  .q-kicker{font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-soft); font-weight:700; margin-bottom:10px;}
  .teach-title{font-size:23px; margin-bottom:18px;}
  .concept{
    background:var(--white); border:2px solid var(--paper-line); border-radius:14px;
    padding:16px 18px; margin-bottom:14px; box-shadow:0 3px 0 var(--paper-line);
  }
  .concept h3{font-size:15.5px; margin-bottom:8px;}
  .concept p{font-size:14px; line-height:1.55; color:var(--ink); margin:0 0 8px;}
  .concept ul{margin:0; padding-left:18px; font-size:13.5px; color:var(--ink-soft); line-height:1.5;}
  .concept ul li{margin-bottom:4px;}
  .concept ul li b{color:var(--ink);}

  .question-wrap{padding:28px 22px 130px;}
  .q-text{font-family:'Fraunces', serif; font-size:22px; font-weight:600; line-height:1.35; color:var(--ink); margin-bottom:22px;}
  .q-text .blank{text-decoration:underline; text-decoration-style:dashed; text-decoration-color:var(--leaf); text-underline-offset:5px; color:var(--leaf-dark);}
  .q-type-tag{display:inline-block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; color:var(--violet-dark); background:var(--violet-pale); padding:3px 9px; border-radius:20px; margin-bottom:10px;}

  .options{display:flex; flex-direction:column; gap:12px;}
  .option{
    text-align:left; background:var(--white); border:2px solid var(--paper-line);
    border-radius:12px; padding:15px 16px; font-size:16px; font-weight:600; color:var(--ink);
    box-shadow:0 3px 0 var(--paper-line);
    display:flex; align-items:center; gap:12px;
    transition: border-color .12s, background .12s, transform .06s;
    width:100%;
  }
  .option:active{transform:translateY(2px);}
  .option .letter{
    width:26px; height:26px; border-radius:7px; background:var(--paper); border:2px solid var(--paper-line);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--ink-soft); flex:none;
  }
  .option.selected{border-color:var(--leaf); background:var(--leaf-pale);}
  .option.selected .letter{background:var(--leaf); border-color:var(--leaf); color:var(--white);}
  .option.correct{border-color:var(--leaf); background:var(--leaf-pale);}
  .option.correct .letter{background:var(--leaf); border-color:var(--leaf); color:var(--white);}
  .option.wrong{border-color:var(--coral); background:var(--coral-pale);}
  .option.wrong .letter{background:var(--coral); border-color:var(--coral); color:var(--white);}
  .option[disabled]{cursor:default;}

  .tf-row{display:flex; gap:12px;}
  .tf-row .option{flex:1; justify-content:center; text-align:center;}

  /* ---------- Match (relacionar) exercise ---------- */
  .match-hint{font-size:12.5px; color:var(--ink-soft); margin:-10px 0 16px; line-height:1.4;}
  .match-wrap{display:flex; gap:10px;}
  .match-col{flex:1; display:flex; flex-direction:column; gap:9px;}
  .match-item{
    background:var(--white); border:2px solid var(--paper-line); border-radius:10px;
    padding:12px 10px; font-size:12.5px; font-weight:600; text-align:center; line-height:1.3;
    box-shadow:0 3px 0 var(--paper-line); min-height:48px; display:flex; align-items:center; justify-content:center;
    transition:transform .1s;
  }
  .match-item:active{transform:translateY(2px);}
  .match-item.selected{border-color:var(--sky); background:var(--sky-pale); color:var(--sky-dark);}
  .match-item.matched{border-color:var(--leaf); background:var(--leaf-pale); color:var(--leaf-dark); opacity:0.55; box-shadow:none;}
  .match-item.wrong{border-color:var(--coral); background:var(--coral-pale); animation:shake .3s;}
  .match-item[disabled]{cursor:default;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  /* ---------- Bottom action bar ---------- */
  .action-bar{
    position:fixed; bottom:0; left:0; right:0;
    max-width:480px; margin:0 auto;
    background:var(--paper); border-top:1px solid var(--paper-line);
    padding:14px 22px 20px;
    z-index:30;
  }
  .action-bar.state-correct{background:var(--leaf-pale); border-top-color:var(--leaf);}
  .action-bar.state-wrong{background:var(--coral-pale); border-top-color:var(--coral);}
  .feedback-line{display:flex; align-items:center; gap:8px; font-weight:700; margin-bottom:6px; font-size:15px; flex-wrap:wrap;}
  .feedback-line.correct{color:var(--leaf-dark);}
  .feedback-line.wrong{color:var(--coral-dark);}
  .feedback-line .mini-combo{font-size:12px; font-weight:700; color:var(--amber-dark); background:var(--amber-pale); padding:2px 8px; border-radius:20px;}
  .feedback-explain{font-size:12.5px; color:var(--ink-soft); margin:0 0 10px; line-height:1.4;}
  .btn-primary{
    width:100%; padding:15px; border-radius:12px; font-size:15px; font-weight:700;
    letter-spacing:0.04em; text-transform:uppercase; background:#CFC9B6; color:#8B8570; box-shadow:0 4px 0 #BEB8A4;
  }
  .btn-primary.ready{background:var(--leaf); color:var(--white); box-shadow:0 4px 0 var(--leaf-dark);}
  .btn-primary.ready:active{transform:translateY(3px); box-shadow:0 1px 0 var(--leaf-dark);}
  .btn-primary.wrong-state{background:var(--coral); color:var(--white); box-shadow:0 4px 0 var(--coral-dark);}
  .btn-primary.wrong-state:active{transform:translateY(3px); box-shadow:0 1px 0 var(--coral-dark);}
  .btn-primary.practice-state{background:var(--violet); color:var(--white); box-shadow:0 4px 0 var(--violet-dark);}
  .btn-primary.practice-state:active{transform:translateY(3px); box-shadow:0 1px 0 var(--violet-dark);}

  /* ---------- Summary / gameover screens ---------- */
  .center-screen{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 28px; text-align:center;}
  .center-screen .badge{width:120px; height:120px; margin-bottom:22px;}
  .center-screen h1{font-size:28px; margin-bottom:8px;}
  .center-screen p{color:var(--ink-soft); font-size:15px; margin-bottom:26px; max-width:320px; line-height:1.5;}
  .summary-stats{display:flex; gap:14px; margin-bottom:30px;}
  .summary-stat{background:var(--white); border:2px solid var(--paper-line); border-radius:12px; padding:14px 20px; min-width:96px;}
  .summary-stat .num{font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:700; color:var(--leaf-dark);}
  .summary-stat .lbl{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; font-weight:600;}
  .wide-btn{width:100%; max-width:320px; padding:16px; border-radius:12px; background:var(--leaf); color:var(--white); font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:0.04em; box-shadow:0 4px 0 var(--leaf-dark);}
  .wide-btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--leaf-dark);}
  .wide-btn.secondary{background:transparent; color:var(--ink-soft); box-shadow:none; margin-top:12px; text-transform:none; font-weight:600; letter-spacing:0;}

  .sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
</style>
</head>

<div id="app"></div>

<script>
/* =========================================================================
   PERSISTENCIA
   Usa el almacenamiento persistente de artefactos (window.storage) para
   guardar XP, racha y lecciones completadas entre sesiones. Si por algún
   motivo no está disponible, cae de forma segura a memoria (se pierde al
   cerrar, pero la app sigue funcionando).
   ========================================================================= */
const STORAGE_KEY = 'bioquest-progress-v1';
const Store = {
  data: {},
  _timer: null,
  _saving: false,
  _pending: false,
  get(k, fallback){ return k in this.data ? this.data[k] : fallback; },
  set(k, v){
    this.data[k] = v;
    // Muchas acciones seguidas (cada respuesta, cada par emparejado) disparaban
    // un guardado cada una, lo que hacía que el almacenamiento rechazara pedidos
    // por exceso de frecuencia. Agrupamos los cambios y guardamos una sola vez
    // medio segundo después de la última actualización.
    if (this._timer) clearTimeout(this._timer);
    this._timer = setTimeout(()=>{ this._timer = null; this.persist(); }, 500);
  },
  async persist(attempt){
    attempt = attempt || 0;
    if (this._saving){ this._pending = true; return; }
    this._saving = true;
    try{
      if (window.storage) await window.storage.set(STORAGE_KEY, JSON.stringify(this.data), false);
    }catch(e){
      if (attempt < 2){
        // reintenta un par de veces con una pequeña espera antes de resignarse
        setTimeout(()=>{ this._saving = false; this.persist(attempt + 1); }, 700 * (attempt + 1));
        return;
      }
      console.warn('No se pudo guardar el progreso', e);
    } finally {
      this._saving = false;
    }
    if (this._pending){ this._pending = false; this.persist(); }
  },
  async flush(){
    if (this._timer){ clearTimeout(this._timer); this._timer = null; }
    await this.persist();
  },
  async load(){
    try{
      if (window.storage){
        const r = await window.storage.get(STORAGE_KEY, false);
        if (r && r.value) this.data = JSON.parse(r.value);
      }
    }catch(e){ /* todavía no hay progreso guardado */ }
  }
};
window.addEventListener('visibilitychange', ()=>{ if (document.visibilityState==='hidden') Store.flush(); });
window.addEventListener('pagehide', ()=>{ Store.flush(); });

/* ---------------------------- CONTENIDO ---------------------------- */
const UNITS = [
  {
    "id": "bases",

    "sub": "Ciencia y funciones vitales",

      {

          },

              "<b>Variable dependiente:</b> la respuesta que se mide (el efecto).",

          },
          {
            "heading": "Modelo científico",

            "q": "¿En qué etapa del método se propone una explicación tentativa y comprobable?",

              "Diseño experimental",

            "a": 1
          },
          {

            "q": "El modelo científico es una etapa del método científico.",
            "a": false,

          },
          {
            "type": "mc",
            "q": "La variable que el investigador manipula deliberadamente es la...",
            "opts": [
              "Dependiente",

            ],
            "a": 2
          },
          {

          },
          {

            "q": "¿Qué se hace con los datos obtenidos después de un experimento?",
            "opts": [
              "Se analizan para sacar conclusiones",
              "Se descartan siempre",
              "Se usan como hipótesis",
              "Se convierten en modelo"
            ],
            "a": 0,
            "explain": "El análisis de datos permite aceptar, rechazar o ajustar la hipótesis inicial."
          },
          {
            "type": "tf",
            "q": "Las repeticiones de un experimento aumentan la confiabilidad del resultado.",
            "a": true,
            "explain": "Repetir un experimento varias veces reduce el efecto del azar y hace más confiable la conclusión."
          },
          {
            "type": "mc",
            "q": "¿Cuál es el primer paso habitual del método científico?",
            "opts": [

              "Observar un fenómeno",
              "Diseñar el experimento",

            ],

            "explain": "Todo comienza con la observación de un fenómeno que despierta una pregunta."
          },
          {

          {

          }
        ]
      },
      {
        "title": "Método científico II",
        "teach": [

function isLevelUnlocked(u, l){
  if (u===0 && l===0) return true;
  if (l===0){
    const prevUnit = UNITS[u-1];
    return !!state.completed[`${u-1}-${prevUnit.levels.length-1}`];
  }
  return !!state.completed[`${u}-${l-1}`];
}
function isLevelDone(u,l){ return !!state.completed[`${u}-${l}`]; }
function hasAnyCompleted(){ return Object.keys(state.completed).length > 0; }

function shuffleArr(arr){
  const a = arr.slice();
  for (let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

    html += `<div class="unit-block">
      <div class="unit-header" style="background:${t.grad}">
        <div><h2>${unit.title}</h2><div class="unit-sub">${unit.sub}</div></div>
      </div>
      <div class="path">`;
    unit.levels.forEach((lvl, l)=>{
      const unlocked = isLevelUnlocked(u,l);
      const done = isLevelDone(u,l);
      const isCurrent = unlocked && !done;
      const rowClass = l%3===1 ? 'offset-right' : (l%3===2 ? 'offset-left' : '');
      html += `<div class="node-row ${rowClass}">
        <div class="node ${unlocked?'':'locked'} ${isCurrent?'current':''}">
          <button class="hex" style="background:${unlocked?t.grad:''}" ${unlocked?`onclick="goToLevel(${u},${l})"`:'disabled'} aria-label="${lvl.title}${done?' (completado)':unlocked?'':' (bloqueado)'}">
            ${unlocked
              ? `<svg class="icon" viewBox="0 0 24 24">${ICONS[unit.icon]}</svg>`
              : `<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`
            }
            ${done ? `<span class="check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>` : ''}
          </button>
          <div class="node-label">${lvl.title}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  app.innerHTML = html;
}

function goToLevel(u,l){
  state.unitIdx = u; state.levelIdx = l;
  state.screen = 'teach';
  render();
}

function currentLevel(){ return UNITS[state.unitIdx].levels[state.levelIdx]; }

/* Which set of questions is active right now, depending on screen */
function activeQuestions(){
  return state.screen==='practice' ? state.practicePool : currentLevel().qs;
}

/* ---------------------------- TEACH SCREEN ---------------------------- */
function renderTeach(){
  const lvl = currentLevel();
  let html = `<div class="lesson-header">
    <button class="exit-btn" onclick="exitLesson()" aria-label="Salir">✕</button>
    <div class="teach-heading-line">${UNITS[state.unitIdx].title} · ${lvl.title}</div>
  </div>`;

  html += `<div class="teach-wrap">
    <div class="q-kicker">${lvl.title.trim().endsWith(' II') ? 'Repasá antes de la Parte 2' : 'Aprendé antes de practicar'}</div>
    <h2 class="teach-title">${lvl.title}</h2>`;

  lvl.teach.forEach(block=>{
    html += `<div class="concept">
      <h3>${block.heading}</h3>
      <p>${block.body}</p>
      ${block.bullets ? `<ul>${block.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>` : ''}
    </div>`;
  });

  html += `</div>
  <div class="action-bar">
    <button class="btn-primary ready" onclick="beginQuiz()">Empezar preguntas →</button>
  </div>`;

  app.innerHTML = html;
}

function resetQuizState(){
  state.qIndex = 0; state.hearts = MAX_HEARTS;
  state.selected = null; state.answered = false; state.sessionCorrect = 0;
  state.combo = 0; state.feedbackMsg = ''; state.match = null;
}

function beginQuiz(){
  resetQuizState();
  state.screen = 'lesson';
  render();
}

/* ---------------------------- PRACTICE MODE ---------------------------- */
function startPractice(){
  let pool = [];
  Object.keys(state.completed).forEach(key=>{
    const [u,l] = key.split('-').map(Number);
    const lvl = UNITS[u].levels[l];
    lvl.qs.forEach(q=>{
      pool.push(Object.assign({}, q, { _unit: UNITS[u].title, _level: lvl.title }));
    });
  });
  pool = shuffleArr(pool).slice(0, Math.min(12, pool.length));
  state.practicePool = pool;
  resetQuizState();
  state.hearts = MAX_HEARTS; // shown but not spent in practice
  state.screen = 'practice';
  render();
}

/* ---------------------------- MATCH (RELACIONAR) LOGIC ---------------------------- */
function initMatch(q){
  const terms = shuffleArr(q.pairs.map((p,i)=>({text:p[0], idx:i})));
  const defs = shuffleArr(q.pairs.map((p,i)=>({text:p[1], idx:i})));
  state.match = { terms, defs, matched:new Set(), selTerm:null, selDef:null, wrongPair:null, total:q.pairs.length };
}

function selectMatchTerm(idx){
  if (!state.match || state.match.matched.has(idx)) return;
  state.match.selTerm = idx; state.match.wrongPair = null;
  tryMatch();
  render();
}
function selectMatchDef(idx){
  if (!state.match || state.match.matched.has(idx)) return;
  state.match.selDef = idx; state.match.wrongPair = null;
  tryMatch();
  render();
}
function tryMatch(){
  const m = state.match;
  if (m.selTerm===null || m.selDef===null) return;
  if (m.selTerm === m.selDef){
    m.matched.add(m.selTerm);
    m.selTerm = null; m.selDef = null;
    state.xp += 3; Store.set('xp', state.xp);
    if (m.matched.size >= m.total){
      state.answered = true;
      state.sessionCorrect += 1;
      incrementCombo();
      state.feedbackMsg = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];
    }
  } else {
    m.wrongPair = { term:m.selTerm, def:m.selDef };
    m.selTerm = null; m.selDef = null;
    resetCombo();
    setTimeout(()=>{ if (state.match){ state.match.wrongPair = null; render(); } }, 450);
  }
}

function incrementCombo(){ state.combo += 1; }
function resetCombo(){ state.combo = 0; }

/* ---------------------------- QUIZ SCREEN (lesson & practice) ---------------------------- */
function formatQText(text){
  return text.replace('___', '<span class="blank">___</span>');
}

function renderQuizScreen(){
  const practice = state.screen==='practice';
  const qs = activeQuestions();
  const q = qs[state.qIndex];
  const pct = Math.round((state.qIndex/qs.length)*100);
  const lvl = practice ? null : currentLevel();

  let html = `<div class="lesson-header">
    <button class="exit-btn" onclick="exitLesson()" aria-label="Salir">✕</button>
    <div class="progress-track"><div class="progress-fill ${practice?'practice-fill':''}" style="width:${pct}%"></div></div>
    ${practice
      ? `<div class="hearts-mini" style="color:var(--violet-dark)">🔁 ${state.qIndex+1}/${qs.length}</div>`
      : `<div class="hearts-mini">${heartIconSvg()}${state.hearts}</div>`
    }
    ${state.combo>=2 ? `<div class="combo-badge">🔥 ${state.combo}</div>` : ''}
  </div>`;

  html += `<div class="question-wrap">
    <div class="q-kicker">${practice ? (q._unit+' · '+q._level) : (UNITS[state.unitIdx].title+' · '+lvl.title)}</div>`;

  if (q.type==='match'){
    if (!state.match || (state.match.total !== q.pairs.length && !state.answered)) initMatch(q);
    html += `<div class="q-text">${formatQText(q.q)}</div>
      <div class="match-hint">Tocá un término y después su definición para relacionarlos.</div>
      <div class="match-wrap">
        <div class="match-col">${state.match.terms.map(t=>{
          let cls='match-item';
          if (state.match.matched.has(t.idx)) cls+=' matched';
          else if (state.match.selTerm===t.idx) cls+=' selected';
          else if (state.match.wrongPair && state.match.wrongPair.term===t.idx) cls+=' wrong';
          return `<button class="${cls}" ${state.match.matched.has(t.idx)?'disabled':''} onclick="selectMatchTerm(${t.idx})">${t.text}</button>`;
        }).join('')}</div>
        <div class="match-col">${state.match.defs.map(d=>{
          let cls='match-item';
          if (state.match.matched.has(d.idx)) cls+=' matched';
          else if (state.match.selDef===d.idx) cls+=' selected';
          else if (state.match.wrongPair && state.match.wrongPair.def===d.idx) cls+=' wrong';
          return `<button class="${cls}" ${state.match.matched.has(d.idx)?'disabled':''} onclick="selectMatchDef(${d.idx})">${d.text}</button>`;
        }).join('')}</div>
      </div>`;
  } else {
    if (q.type==='fill') html += `<div class="q-type-tag">Completá</div>`;
    html += `<div class="q-text">${formatQText(q.q)}</div>`;
    if (q.type==='mc' || q.type==='fill'){
      html += `<div class="options">`;
      q.opts.forEach((opt,i)=>{ html += optionHtml(i, opt, i===q.a); });
      html += `</div>`;
    } else {
      html += `<div class="tf-row">
        ${optionHtml(true, 'Verdadero', q.a===true)}
        ${optionHtml(false, 'Falso', q.a===false)}
      </div>`;
    }
  }
  html += `</div>`;

  html += actionBarHtml();
  app.innerHTML = html;
}

function optionHtml(value, label, isCorrectValue){
  const letters = {0:'A',1:'B',2:'C',3:'D', true:'V', false:'F'};
  let cls = 'option';
  let disabled = '';
  if (state.answered){
    disabled = 'disabled';
    const selected = state.selected===value;
    if (isCorrectValue) cls += ' correct';
    else if (selected) cls += ' wrong';
  } else if (state.selected===value){
    cls += ' selected';
  }
  return `<button class="${cls}" ${disabled} onclick="selectOption(${JSON.stringify(value)})">
    <span class="letter">${letters[value]}</span><span>${label}</span>
  </button>`;
}

function selectOption(value){
  if (state.answered) return;
  state.selected = value;
  render();
}

function actionBarHtml(){
  const practice = state.screen==='practice';
  const qs = activeQuestions();
  const q = qs[state.qIndex];

  if (q.type==='match'){
    if (!state.answered){
      return `<div class="action-bar"><button class="btn-primary" disabled>Relacioná todos los pares</button></div>`;
    }
    return `<div class="action-bar state-correct">
      <div class="feedback-line correct">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg> ${state.feedbackMsg||'¡Todo relacionado!'}
        ${state.combo>=2 ? `<span class="mini-combo">🔥 Racha de ${state.combo}</span>` : ''}
      </div>
      <button class="btn-primary ready ${practice?'practice-state':''}" onclick="nextQuestion()">Continuar</button>
    </div>`;
  }

  if (!state.answered){
    const ready = state.selected!==null;
    return `<div class="action-bar">
      <button class="btn-primary ${ready?(practice?'ready practice-state':'ready'):''}" ${ready?'':'disabled'} onclick="checkAnswer()">Comprobar</button>
    </div>`;
  }
  const correct = state.selected === q.a;
  return `<div class="action-bar ${correct?'state-correct':'state-wrong'}">
    <div class="feedback-line ${correct?'correct':'wrong'}">
      ${correct
        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg> ${state.feedbackMsg||'¡Correcto!'}`
        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg> Respuesta incorrecta`
      }
      ${correct && state.combo>=2 ? `<span class="mini-combo">🔥 Racha de ${state.combo}</span>` : ''}
    </div>
    ${q.explain ? `<p class="feedback-explain">${q.explain}</p>` : ''}
    <button class="btn-primary ready ${correct?(practice?'practice-state':''):'wrong-state'}" onclick="nextQuestion()">Continuar</button>
  </div>`;
}

function checkAnswer(){
  if (state.selected===null || state.answered) return;
  const practice = state.screen==='practice';
  const qs = activeQuestions();
  const q = qs[state.qIndex];
  state.answered = true;
  if (state.selected === q.a){
    state.xp += practice ? 5 : 10;
    Store.set('xp', state.xp);
    state.sessionCorrect += 1;
    incrementCombo();
    state.feedbackMsg = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];
  } else {
    resetCombo();
    if (!practice) state.hearts -= 1;
  }
  render();

  if (!practice && state.hearts <= 0){
    setTimeout(()=>{ state.screen='gameover'; render(); }, 900);
  }
}

function nextQuestion(){
  const practice = state.screen==='practice';
  const qs = activeQuestions();
  if (!practice && state.hearts<=0) return;
  state.qIndex += 1;
  state.selected = null;
  state.answered = false;
  state.match = null;
  state.feedbackMsg = '';

  if (state.qIndex >= qs.length){
    if (practice){
      state.screen = 'practiceSummary';
    } else {
      const key = `${state.unitIdx}-${state.levelIdx}`;
      if (!state.completed[key]){
        state.completed[key] = true;
        Store.set('completed', state.completed);
        state.streak += 1;
        Store.set('streak', state.streak);
      }
      state.screen = 'summary';
    }
  }
  render();
}

function exitLesson(){
  state.screen = 'home';
  render();
}

function renderSummary(){
  const lvl = currentLevel();
  const total = lvl.qs.length;
  app.innerHTML = `<div class="center-screen">
    <svg class="badge" viewBox="0 0 24 24" fill="none" stroke="var(--leaf)" stroke-width="1.3">
      <circle cx="12" cy="12" r="9" fill="var(--leaf-pale)"/>
      <path d="M8 12.5l2.7 2.7L16 9.5" stroke="var(--leaf)" stroke-width="2"/>
    </svg>
    <h1>¡Lección completa!</h1>
    <p>Terminaste "${lvl.title}" de ${UNITS[state.unitIdx].title}.</p>
    <div class="summary-stats">
      <div class="summary-stat"><div class="num">${state.sessionCorrect}/${total}</div><div class="lbl">Correctas</div></div>
      <div class="summary-stat"><div class="num">+${state.sessionCorrect*10}</div><div class="lbl">XP ganado</div></div>
      <div class="summary-stat"><div class="num">${state.streak}</div><div class="lbl">Racha</div></div>
    </div>
    <button class="wide-btn" onclick="backToHome()">Continuar</button>
    <button class="wide-btn secondary" onclick="startPractice()">Repasar por repetición 🔁</button>
  </div>`;
}

function renderPracticeSummary(){
  const total = state.practicePool.length;
  app.innerHTML = `<div class="center-screen">
    <svg class="badge" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="1.3">
      <circle cx="12" cy="12" r="9" fill="var(--violet-pale)"/>
      <path d="M8 12.5l2.7 2.7L16 9.5" stroke="var(--violet)" stroke-width="2"/>
    </svg>
    <h1>¡Repaso completo!</h1>
    <p>Repasaste ${total} preguntas de todo lo que ya aprendiste. La repetición es la clave para que no se te olvide.</p>
    <div class="summary-stats">
      <div class="summary-stat"><div class="num">${state.sessionCorrect}/${total}</div><div class="lbl">Correctas</div></div>
      <div class="summary-stat"><div class="num">+${state.sessionCorrect*5}</div><div class="lbl">XP ganado</div></div>
    </div>
    <button class="wide-btn" onclick="startPractice()">Repasar de nuevo</button>
    <button class="wide-btn secondary" onclick="backToHome()">Volver al mapa</button>
  </div>`;
}

function renderGameOver(){
  app.innerHTML = `<div class="center-screen">
    <svg class="badge" viewBox="0 0 24 24" fill="none" stroke="var(--coral)" stroke-width="1.3">
      <circle cx="12" cy="12" r="9" fill="var(--coral-pale)"/>
      <path d="M9 9l6 6M15 9l-6 6" stroke="var(--coral)" stroke-width="2"/>
    </svg>
    <h1>Te quedaste sin vidas</h1>
    <p>No pasa nada — repasá la lección "${currentLevel().title}" y volvé a intentarlo.</p>
    <button class="wide-btn" onclick="retryLevel()">Reintentar lección</button>
    <button class="wide-btn secondary" onclick="backToHome()">Volver al mapa</button>
  </div>`;
}

function retryLevel(){
  resetQuizState();
  state.screen = 'lesson';
  render();
}

function backToHome(){
  state.screen = 'home';
  render();
}

/* ---------------------------- INIT ---------------------------- */
(async function init(){
  await Store.load();
  state.xp = Store.get('xp', 0);
  state.streak = Store.get('streak', 0);
  state.completed = Store.get('completed', {});
  render();
})();
</script>
</body>
</html>
